    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const app = initializeApp({ apiKey: "AIzaSyCUqYFyYMHQNT8-CdOfkdh2mMhv4bUNIh4", authDomain: "chatap-2ca07.firebaseapp.com", databaseURL: "https://chatap-2ca07-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chatap-2ca07", storageBucket: "chatap-2ca07.firebasestorage.app", messagingSenderId: "46577729580", appId: "1:46577729580:web:bb7843488d7cd77c895189" }); 
        const db = getDatabase(app); const messagesRef = ref(db, 'nexus_global_chat'); let isListening = false; const myUsername = "User_" + Math.floor(Math.random() * 10000);
        window.sendGlobalChatMessage = async () => { const input = document.getElementById("globalUserInput"); const text = input.value.trim(); if (!text) return; input.value = ""; try { await push(messagesRef, { name: myUsername, text: text, timestamp: Date.now() }); } catch (e) { alert("Permission Denied!"); } };
        window.startGlobalChatListener = () => { if (isListening) return; isListening = true; onChildAdded(messagesRef, (snap) => { const data = snap.val(); const chatBox = document.getElementById("globalChatBox"); if (chatBox) { const isMe = data.name === myUsername; chatBox.innerHTML += `<div class="chat-message ${isMe?'global-msg-me':'global-msg-other'} max-w-md"><span class="text-[10px] opacity-70 mb-1 uppercase">${isMe?'You':data.name}</span><span class="text-sm">${data.text}</span></div>`; chatBox.scrollTop = chatBox.scrollHeight; } }); };
    </script>
